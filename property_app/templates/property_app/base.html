{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}RentNav{% endblock %}</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@800&family=Inter:wght@400;600;700;800&display=swap"
              rel="stylesheet">
        <link rel="stylesheet" href="{% static 'property_app/css/site.css' %}">
        {% block extra_head %}{% endblock %}
    </head>
    <body data-autocomplete-url="{% url 'location_autocomplete' %}">
        {% include "property_app/partials/_header.html" %}
        <main class="site-main">
            {% block content %}{% endblock %}
        </main>
        {% include "property_app/partials/_footer.html" %}
        <script src="{% static 'property_app/js/script.js' %}"></script>
        {% block extra_scripts %}{% endblock %}
    </body>
</html>
